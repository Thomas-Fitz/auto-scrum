# auto-scrum configuration
project:
  name: my-project          # Display name for reports and artifacts
  user: developer           # Developer or team name

agents:
  orchestrator:
    model: claude-opus-4.6  # Model ID for the pipeline orchestrator
  architect:
    model: claude-opus-4.6  # Model ID for the architect agent
  developer:
    model: claude-opus-4.6  # Model ID for the developer agent
  reviewer:
    model: claude-opus-4.6  # Model ID for the adversarial code reviewer

git:
  # task | story | epic | never (default: never)
  commit_frequency: never

pipeline:
  # Maximum dev/review loop iterations per story before the orchestrator
  # makes a judgment call and moves on.
  max_review_cycles: 3

auto_scrum:
  platform: copilot             # 'copilot' | 'claude' | 'opencode'
  skills_dir: ~/.copilot/skills # Path where auto-scrum skills are installed
                                # Set automatically by setup; update if you move your skills
                                # e.g. ~/.copilot/skills, ~/.claude/skills, ~/.config/opencode/skills
