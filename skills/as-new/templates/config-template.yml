# auto-scrum configuration
project:
  name: my-project          # Display name for reports and artifacts
  user: developer           # Developer or team name

artifacts:
  base_dir: .auto-scrum     # Root directory for all auto-scrum artifacts

agents:
  orchestrator:
    model: claude-sonnet-4-6  # Model ID for the pipeline orchestrator
  architect:
    model: claude-sonnet-4-6  # Model ID for the architect agent
  developer:
    model: claude-sonnet-4-6  # Model ID for the developer agent
  reviewer:
    model: claude-sonnet-4-6  # Model ID for the adversarial code reviewer

git:
  # task | story | epic | never (default: never)
  commit_frequency: never

pipeline:
  # Maximum dev/review loop iterations per story before the orchestrator
  # makes a judgment call and moves on.
  max_review_cycles: 3

auto_scrum:
  install_mode: project         # 'project' | 'global'
                                # project = skills are at .github/copilot/skills/
                                # global  = skills are at {global_skills_dir}
  global_skills_dir: ~/.copilot/skills  # only used when install_mode: global
                                         # change this if you installed skills to a custom path
                                         # tilde (~) is expanded to the user's home directory
